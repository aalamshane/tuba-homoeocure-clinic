services:
  mongodb:
    image: mongo:7.0
    container_name: clinic-mongodb
    restart: unless-stopped
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: homeopathy_clinic
    volumes:
      - mongo_data:/data/db
      - ./mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017/homeopathy_clinic", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
    container_name: clinic-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      MONGODB_URI: mongodb://mongodb:27017/homeopathy_clinic
    ports:
      - "${BACKEND_PORT:-8081}:8081"

  frontend:
    build:
      context: ./frontend
    container_name: clinic-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  mongo_data:
